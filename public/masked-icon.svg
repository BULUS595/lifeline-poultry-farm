<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#1a5a2d"/>
  
  <!-- Chicken silhouette (simplified) -->
  <circle cx="256" cy="200" r="60" fill="#ffffff"/>
  <circle cx="240" cy="140" r="40" fill="#ffffff"/>
  
  <!-- Tail -->
  <path d="M 310 200 Q 380 180 390 220" stroke="#ffffff" stroke-width="20" fill="none" stroke-linecap="round"/>
  
  <!-- Legs -->
  <line x1="240" y1="260" x2="240" y2="340" stroke="#FF8C00" stroke-width="15" stroke-linecap="round"/>
  <line x1="270" y1="260" x2="270" y2="340" stroke="#FF8C00" stroke-width="15" stroke-linecap="round"/>
  
  <!-- Farm elements -->
  <rect x="100" y="350" width="200" height="120" fill="#8B6F47"/>
  <polygon points="100,350 200,250 300,350" fill="#A0826D"/>
</svg>
